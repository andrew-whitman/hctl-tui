# Example matrix template.
# Live files: ~/.config/hctl-tui/matrices/<hctl-profile>/<module>.yaml
#
# type: github  (default) — fetch webhook trigger via get-trigger, resolve
#               inputYaml / <+trigger.*>, execute pipeline with --body @file
# type: custom  — POST a Harness custom webhook trigger
#
# Auth belongs in ~/.config/hctl via `hts init` / `hctl init`.

module: ci
entries: []
# Example (GitHub webhook trigger → pipeline execute):
# entries:
#   - alias: my-alias
#     type: github
#     tech: java
#     set: shared
#     trigger: MY_GITHUB_TRIGGER_ID   # required: hctl triggers get-trigger
#     branch: main                   # resolves <+trigger.branch>; PR build → branch
#     # repo: my-org/my-repo          # optional override → --repo-identifier
#     # connector: github_connector  # optional override → connectorRef query
#     pipeline:
#       org: YOUR_ORG
#       project: YOUR_PROJECT
#       identifier: YOUR_PIPELINE_ID
#
# Example (custom webhook):
#   - alias: webhook-alias
#     type: custom
#     trigger: MY_CUSTOM_TRIGGER_ID
#     tech: java
#     set: shared
#     pipeline:
#       org: YOUR_ORG
#       project: YOUR_PROJECT
#       identifier: YOUR_PIPELINE_ID
