# Example matrix template.
# Live files: ~/.config/hctl-tui/matrices/<hctl-profile>/<module>.yaml
#
# type: github  (default) — execute the pipeline via Harness API
#               (use this when pipelines are wired to GitHub triggers)
# type: custom  — POST a Harness custom webhook trigger
#
# Auth belongs in ~/.config/hctl via `hts init` / `hctl init`.

module: ci
entries: []
# Example (GitHub / pipeline execute):
# entries:
#   - alias: my-alias
#     type: github
#     tech: java
#     set: shared
#     # optional: input set id, git branch for remote pipelines
#     # trigger: my_input_set
#     # branch: main
#     pipeline:
#       org: YOUR_ORG
#       project: YOUR_PROJECT
#       identifier: YOUR_PIPELINE_ID
#
# Example (custom webhook):
#   - alias: webhook-alias
#     type: custom
#     trigger: MY_CUSTOM_TRIGGER_ID
#     tech: java
#     set: shared
#     pipeline:
#       org: YOUR_ORG
#       project: YOUR_PROJECT
#       identifier: YOUR_PIPELINE_ID
