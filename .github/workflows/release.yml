name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          version="$(python3 -c "
          import re
          from pathlib import Path
          text = Path('pyproject.toml').read_text()
          match = re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.M)
          if not match:
              raise SystemExit('version not found in pyproject.toml')
          print(match.group(1))
          ")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; skipping."
            exit 0
          fi

          prev_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [[ -n "$prev_tag" ]]; then
            range="${prev_tag}..HEAD"
          else
            range="HEAD"
          fi

          NOTES_FILE="$(mktemp)"
          PREV_TAG="$prev_tag" RANGE="$range" TAG="$TAG" REPO="$REPO" python3 - <<'PY' > "$NOTES_FILE"
          import os
          import subprocess

          range_spec = os.environ["RANGE"]
          prev_tag = os.environ.get("PREV_TAG", "")
          tag = os.environ["TAG"]
          repo = os.environ["REPO"]

          log = subprocess.check_output(
              [
                  "git",
                  "log",
                  "--no-merges",
                  "--pretty=format:%s%x1f%b%x1e",
                  range_spec,
              ],
              text=True,
          )

          print("## What's Changed\n")
          entries = [e for e in log.split("\x1e") if e.strip()]
          if not entries:
              print("_No commits in this release._\n")
          else:
              for entry in entries:
                  subject, _, body = entry.partition("\x1f")
                  subject = subject.strip()
                  body = body.strip()
                  if not subject:
                      continue
                  print(f"- **{subject}**")
                  if body:
                      for line in body.splitlines():
                          print(f"  {line}" if line.strip() else "")
                  print()

          if prev_tag:
              print(f"**Compare:** https://github.com/{repo}/compare/{prev_tag}...{tag}")
          PY

          gh release create "$TAG" \
            --title "hctl-tui ${VERSION}" \
            --notes-file "$NOTES_FILE" \
            --target "${{ github.sha }}"
